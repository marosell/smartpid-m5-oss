; SmartPID M5 PRO — Open-source reimplementation
; Target board: M5Stack Basic/Core 16MB (ESP32-D0WDQ6-V3, ILI9342C 320x240, 3 buttons, 16MB flash)
;              NOT Core2 - Core2 has AXP192 PMIC + capacitive touch; Basic/Core does not.
;
; ── PRE-FLASH SAFETY CHECKLIST ────────────────────────────────────────────────
; Run ALL of these BEFORE first `pio run -t upload` to this device:
;
; 1. eFuse check (USB serial cable required, OEM firmware running):
;       esptool --chip esp32 -p /dev/tty.XXXX efuse_summary
;    If FLASH_ENCRYPTION_ENABLED ≠ 0 or ABS_DONE_0/1 ≠ 0 (secure boot):
;    STOP — do NOT flash via USB. Use OTA via OEM firmware instead.
;
; 2. GPIO 12 strapping pin:
;    Verify with voltmeter that GPIO 12 rests at 0V (LOW) when device is
;    powered but not actively driving RL1. If it rests HIGH (>0.8V),
;    do NOT flash — every upload reset will mis-configure the flash voltage.
;    See output_control.h GPIO_CH0_OUT warning for details.
;
; ── UPLOAD COMMANDS ───────────────────────────────────────────────────────────
; Initial USB flash: pio run -t upload
; OTA (LAN):         pio run -t upload --upload-port <device-ip>
; Monitor:           pio device monitor
; Test:              pio test -e test

[platformio]
default_envs = m5stack-core-esp32-16M

[env:m5stack-core-esp32-16M]
platform    = espressif32
board       = m5stack-core-esp32-16M
framework   = arduino

monitor_speed  = 115200
upload_speed   = 460800   ; board-definition default; 921600 may fail on marginal USB cables
board_build.flash_mode = dio
board_build.f_flash = 40000000L
board_build.partitions = partitions.csv

lib_deps =
    m5stack/M5Unified        @ ^0.2.0
    bblanchon/ArduinoJson    @ ^7.3.0
    knolleary/PubSubClient   @ ^2.8
    br3ttb/PID               @ ^1.2.1    ; Arduino-PID-Library (Brett Beauregard)
    ; Phase 7 captive portal: uses arduino-esp32 3.x built-in WebServer + DNSServer.
    ; No external WiFiManager library needed (2.0.17 was incompatible with 3.x).
    ; WebServer.h and DNSServer.h are bundled with framework-arduinoespressif32.
    ;
    ; DS18B20 1-Wire probe driver (ProbeType::DS18B20).
    ; GPIO pin assignments are BENCH-VERIFY — see probe.h DS18B20_CH1_GPIO / CH2_GPIO.
    paulstoffregen/OneWire          @ ^2.3.7
    milesburton/DallasTemperature   @ ^3.11.0

; Full LDF resolution — needed for M5Unified's transitive ESP-IDF deps
lib_ldf_mode = deep+

; Exclude the desktop SDL2 emulator sources — those are native-only
build_src_filter = +<*> -<desktop/>

build_flags =
    -DCORE_DEBUG_LEVEL=3
    ; arduino-esp32 3.x: WiFi library needs Network/src on include path.
    ; PlatformIO doesn't auto-wire framework-internal library headers.
    ; See: https://github.com/espressif/arduino-esp32/issues/xxxxx
    -I${sysenv.HOME}/.platformio/packages/framework-arduinoespressif32/libraries/Network/src

; ── Desktop SDL2 display emulator ─────────────────────────────────────────────
; Compiles display.cpp against LovyanGFX's SDL2 backend (no ESP32 hardware needed).
; Opens a 320×240 window showing the real display state machine; buttons are
; mapped to keyboard keys: A/Left = BtnA, B/Enter = BtnB, C/Right = BtnC, Q = quit.
;
; Prerequisites (macOS):
;   brew install sdl2
;
; Build & run:
;   pio run -e desktop
;   .pio/build/desktop/program
[env:desktop]
platform  = native

; Compile display.cpp and shared runtime services against desktop shims.
; The real main.cpp and all other ESP32-specific sources are excluded.
build_src_filter = -<*> +<display.cpp> +<clock_sync.cpp> +<command_handler.cpp> +<telemetry.cpp> +<desktop/>

; Shims directory searched FIRST so <Arduino.h>, <M5Unified.h> etc. resolve to
; our stubs rather than the ESP32 SDK. Then src/ for project headers.
; SDL2 flags hardcoded for Homebrew/Apple-Silicon path (avoids sdl2-config PATH issues).
build_flags =
    -DDESKTOP_BUILD
    -std=c++17
    -I src/desktop/shims
    -I src
    -I/opt/homebrew/include
    -D_THREAD_SAFE
    -L/opt/homebrew/lib
    -lSDL2

lib_deps =
    lovyan03/LovyanGFX @ ^1.2.0
    bblanchon/ArduinoJson @ ^7.3.0

lib_ldf_mode = deep+

; ── Unit tests (run on device via USB) ─────────────────────────────────────────
[env:test]
platform    = espressif32
board       = m5stack-core-esp32-16M
framework   = arduino

test_framework = unity
board_build.partitions = partitions.csv

lib_deps =
    bblanchon/ArduinoJson @ ^7.3.0

; Minimal build for unit tests — no M5Unified/WiFiManager overhead
build_flags =
    -DUNIT_TEST
    -DCORE_DEBUG_LEVEL=0
