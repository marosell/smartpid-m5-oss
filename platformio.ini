; SmartPID M5 PRO — Open-source reimplementation
; Target board: M5Stack Core2 (ESP32-D0WDQ6-V3)
;
; Build: pio run
; Upload: pio run -t upload
; OTA:   pio run -t upload --upload-port <device-ip>
; Monitor: pio device monitor
; Test:    pio test -e test

[platformio]
default_envs = m5stack-core2

[env:m5stack-core2]
platform    = espressif32
board       = m5stack-core2
framework   = arduino

monitor_speed  = 115200
upload_speed   = 921600
board_build.partitions = partitions.csv

lib_deps =
    m5stack/M5Unified        @ ^0.2.0
    bblanchon/ArduinoJson    @ ^7.3.0
    knolleary/PubSubClient   @ ^2.8
    tzapu/WiFiManager        @ ^2.0.17

; Full LDF resolution — needed for M5Unified's transitive ESP-IDF deps
lib_ldf_mode = deep+

build_flags =
    -DCORE_DEBUG_LEVEL=3

; ── Unit tests (run on device via USB) ─────────────────────────────────────────
[env:test]
platform    = espressif32
board       = m5stack-core2
framework   = arduino

test_framework = unity
board_build.partitions = partitions.csv

lib_deps =
    bblanchon/ArduinoJson @ ^7.3.0

; Minimal build for unit tests — no M5Unified/WiFiManager overhead
build_flags =
    -DUNIT_TEST
    -DCORE_DEBUG_LEVEL=0
